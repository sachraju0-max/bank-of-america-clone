  "name": "Bank of America Advantage Banking: Open a Checking Account Today",
  "description": "Explore checking account options designed to fit your changing needs. Open a Bank of America Advantage Banking account online today.",
  "keywords": "checking account, checking, online checking account, open checking account online, checking accounts, open a checking account online, open a checking account, wfid24967596",
  "url": "/www.bankofamerica.com/deposits/checking/advantage-banking/",
  "image": "/www.bankofamerica.com/content/images/ContextualSiteGraphics/Logos/en_US/logos/colored_flagscape-v2.png",
  "mainEntity": [
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What is a checking account and how does it work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A checking account is a bank account where you can deposit and withdraw your money when you want. It's the account you'll likely use to deposit paychecks, pay bills, get cash and transfer funds. Checking accounts usually offer a debit card to use online, at stores and at ATMs. Some checking accounts offer paper checks for making payments. Some checking accounts may earn interest."
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How are checking, savings and certificate of deposit (CD) accounts different?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>A <strong>checking account</strong> is for using your money for everyday needs, like making purchases or payments. Checking accounts usually offer a debit card to use online, at stores and at ATMs. Some checking accounts offer paper checks for making payments.</p><p>A <strong>savings account</strong> is for setting aside money for longer-term goals. Savings accounts earn interest and may offer an ATM card for making deposits and getting cash.</p><p>If you have a <strong>Bank of America checking and savings account</strong>, you can link them together and access both accounts at ATMs with your debit card. However, debit card payments and purchases withdraw from your checking account.</p><p>A <strong>certificate of deposit (CD) account</strong> is for setting aside money for a set time — from 1 month to several years. CDs may pay more interest, but your access to your money is limited until the end of the set time.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I open a Bank of America checking account? Can I open one online?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You can apply for a Bank of America checking account online or at a financial center, with a few exceptions.</p> <p><strong>For SafeBalance Banking® for Family Banking</strong><br>You can only apply online. This account is for existing Bank of America customers. You must already have a personal checking or savings account with us and an Online Banking account login.</p> <p><strong>For all other Bank of America checking accounts</strong><br>If you're applying with someone under age 13, you must apply at a financial center. Otherwise, you can apply online.</p> <p><strong>How to apply online</strong><br> 1. Select an account and choose <strong>Open now</strong> to go to the application.<br> 2. Enter and verify your information.<br> 3. Choose features you want to add, like a debit card.<br> 4. Once approved, make the minimum opening deposit of $25 or $100, depending on the account.<br> 5. Check your email for next steps.</p> <p><strong>How to find a financial center</strong><br>We have thousands of financial centers and ATMs across the U.S.<br><a href='https://locators.bankofamerica.com/'>Find a financial center or ATM</a></p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What does FDIC-insured mean?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>The Federal Deposit Insurance Corporation (FDIC) is an independent agency of the United States government. If an FDIC-insured bank or savings association fails, the FDIC protects depositors against the loss of their insured deposits. Deposits are automatically insured up to at least $250,000 per depositor, per FDIC-insured bank, per ownership category.</p><p>FDIC deposit insurance is backed by the United States government. FDIC insurance covers all types of deposit accounts — checking, savings, money market savings and CDs — as well as bank individual retirement accounts (IRAs).</p><p>Visit <a href='https://www.fdic.gov/'>the FDIC</a> for more information."
      }
    }
  ]

l Percentage Yield (APY) is accurate as of {annualPercentageYieldTimeStamp.value::XXXX}. These rates may change at any time without prior notice. Fees could reduce earnings on the account."},"lifePlanForSwitchBank":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.LifePlan.html"},"mobileErica":{"contentReq":"disclosures.manifests.salesonb.online-banking","contentKey":"footnotes.erica-language-support.html"},"earnRewards":{"html":"You must be enrolled in Online Banking or Mobile Banking to participate in the deals program and have either an eligible Bank of America<sup>®</sup> debit/credit card or Merrill credit card. Earned cash back will be credited into an eligible consumer deposit or credit account within 30 days following redemption. This deals program may not include deals available through other rewards programs. Data connection required. Wireless carrier fees may apply. For SafeBalance Banking<sup>®</sup> for Family Banking accounts, the parent owner can participate in the deals program but their child using the account cannot."},"ericaVirtualAssistance":{"html":"The mobile feature, Erica, is only available in the English language. This feature requires that you download the latest version of the Mobile Banking app and is only available for select mobile devices.  Message and data rates may apply. Your chat may be monitored for quality assurance. For SafeBalance Banking® for Family Banking accounts, the parent owner and their child age 13 or older have access to Erica."},"fingerPrintScannerEnrollment":{"html":"Certain devices are eligible for enrollment in Touch ID<sup>&reg;</sup>, Face ID<sup>&reg;</sup> or fingerprint login. If eligible, you will have the option to enroll by following the prompts within the Mobile Banking app. If you store multiple fingerprints on your device including those of additional persons, those persons will also be able to access your Bank of America Mobile Banking app via fingerprint, including the ability to access a call center, when Touch ID<sup>&reg;</sup> or fingerprint is enabled. Data connection required. Wireless carrier fees may apply."},"alertsReceivedTextMessages":{"html":"You may elect to receive alerts via text or email. Bank of America does not charge for this service, but your mobile carrier&#x27;s message and data rates may apply. Delivery of alerts may be affected or delayed by your mobile carrier’s coverage."},"debitCardControls":{"html":"We may allow you to lock your physical debit card or virtual cards. You must lock each card type individually. Locking your physical card will not lock your virtual cards.  Similarly, locking a virtual card will not lock your physical card or any other distinct virtual card. Each virtual card must be locked individually. We may provide you the ability to apply or remove a lock at your discretion via Online and/or Mobile banking.  Locking your physical debit card will not lock or prevent transactions from being authorized using your digital card for debit or for any virtual cards stored in digital wallets. Locking your card is not a replacement for reporting your card lost or stolen. This feature is available on the Mobile App for iPad, iPhone and Android devices and Online Banking for your physical debit card and on the Mobile Banking app only for your digital card. Data connection required for Mobile app and wireless carrier fees may apply."},"liabilityGuarentee":{"html":"Notify us within a reasonable time of the unauthorized use or the loss or theft of your card, card number or PIN. Certain restrictions apply. Consult your account documents for details. "},"fiduciaryAccounts":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing Advantage SafeBalance Banking<sup>&reg;</sup> account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"featuredCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC2K2FDVRI1.timeStamp::XXXX} and applies to the initial term of a new Featured CD. We may limit the amount you deposit in one or more Featured CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"flexibleCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1ST639A1B2.timeStamp::XXXX} and applies to the initial term of a new Flexible CD. Flexible CDs have a 12 month term. We may change the interest rate and APY at any time before account opening without prior notice. The minimum balance required to open a Flexible CD is {epcTokens.value.FSDPTDZZC1ST639A1B2.cdProductAttributes.minimumOpeningBalance::$XXXX}. We may limit the amount you deposit in one or more Flexible CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Deposits are insured by the FDIC up to $250,000 per depositor. Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. See [LINK||depositAgreement] and [LINK||depositsRateSheet] for more detail."},"standardCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1078F31GD1.timeStamp::XXXX} and applies to the initial term of a new Fixed Term CD. We may limit the amount you deposit in one or more Fixed CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"digitalDebitControl":{"html":"Customers enrolled in Mobile Banking may opt to receive the digital card for debit, a virtual card that that can be accessed anytime in Mobile Banking. The digital card for debit is designed for you to always have access to your digital card credentials to make online purchases, including when you’ve just requested a new or replacement physical card and haven’t received it yet. Some transaction types may not be supported by the digital card for debit. Digital card for debit cannot be used for in person sales unless it’s added/loaded to your digital wallet. You must have a physical debit card or have ordered a new or replacement physical debit card to get a digital card for debit. Not all clients are eligible for a digital card for debit."}},"siteHeader":{"menuLinks":{"sections":[{"heading":{"content":"Top Deposit Links"}},{"heading":{"content":"Other Deposit Links"}}]}},"siteFooter":{"menuLinks":{"sections":[{"heading":{"content":"Checking"}},{"heading":{"content":"Savings"}},{"heading":{"content":"CDs"}},{"heading":{"content":"IRAs"}},{"heading":{"content":"Managing Your Account"}},{"heading":{"content":"Access Accounts"}}]}},"LINKS":{"bofaRewards2":{"ID":"bofa-rewards-short","TARGET":"_blank","CLASS":"spa-link--inline","URL":"/www.bankofamerica.com/BofARewards","content":"BofA Rewards™"},"bofaRewards2NoTM":{"ID":"bofa-rewards2-no-TM","TARGET":"_blank","CLASS":"spa-link--inline","URL":"https://info.bankofamerica.com/en/bofa-rewards","content":"BofA Rewards"},"ftnlink_personalScheduleOfFees":{"URL":"{webHost}/salesservices/deposits/resources/personal-schedule-fees/","content":"Personal Schedule of Fees"},"ftnlink_preferredRewards":{"URL":"https://promotions.bankofamerica.com/preferredrewards/en"},"ftnlink_termsOfUse":{"URL":"{webHost}/online-banking/service-agreement her payments, at our discretion, we may authorize and pay the item and overdraw your account (an overdraft item), or decline or return the item unpaid (a returned item). Review the [LINK||depositAgreement] and [LINK||personalFee] for details.</div>","<div class&#x3D;&#x27;spacing-bottom-20&#x27;><b>Standard setting</b><br></div>","<div class&#x3D;&#x27;spacing-bottom-20&#x27;>Your checks and scheduled payments may be paid and cause an overdraft. There’s a $10 fee<sup><span class&#x3D;\"ada-hidden\">Footnote </span>1</sup> when we make the payment and overdraw your account. We won’t charge a fee for the returned items, but the payee may.</div>","<div class&#x3D;&#x27;spacing-bottom-20&#x27;><b>Decline All setting</b><br></div>","<div class&#x3D;&#x27;spacing-bottom-20&#x27;>Your checks and scheduled payments will be declined or returned unpaid. We won’t charge a fee for returned items, but the payee may.</div>",{"list":true,"modifiers":"body-small color-gray tooltip-footnote","orderedList":true,"content":["We’ll charge an Overdraft Item Fee for each item that we authorize and pay, including recurring debit card payments. We will not charge a fee to your account when we decline or return an item unpaid; however, you may be charged a fee by the payee. Please see the [LINK||personalFee] for your account for more details."]}]},"trigger":{"content":"Standard or Decline All"}}]}]}]}}}]},"earnRewardsSection":{"heading":{"content":"Earn rewards and save with Bank of America"},"grid":[{"heading":{"content":"BofA Rewards™"},"body":[{"content":"Enjoy benefits that grow as your balances grow—from cash back deals to banking benefits for big milestones. There’s no fee to enroll; all you need is a Bank of America personal checking account."}]},{"heading":{"content":"Keep the Change<sup>&reg;</sup>"},"body":[{"content":"Build your savings with Keep the Change. We&#x27;ll round up your Bank of America debit card purchases to the nearest dollar and transfer the difference to savings.[FOOTNOTE||keepTheChange]"}]},{"heading":{"content":"Cash Back Deals"},"body":[{"content":"Find deals on top brands for shopping, dining, travel and more[FOOTNOTE||earnRewards]. Get cash back when you pay with your Bank of America debit or credit card."}]}]},"lookingForMoreSection":{"heading":{"content":"Resources to help you achieve your financial goals"},"grid":[{"heading":{"content":"Online Banking"},"body":[{"content":"Have an account with us, but need online access? Enroll in Online Banking today."}]},{"heading":{"content":"Better Money Habits®"},"body":[{"content":"Find videos, articles and tips to help you better manage your financial life."}]},{"heading":{"content":"New to the U.S.?"},"body":[{"content":"Better Money Habits has resources on navigating your finances."}]}]},"keepYourAccountSafeSection":{"heading":{"content":"Helping keep your account secure"},"subHeading":{"content":"$0 Liability Guarantee fraud protection"},"subText":{"content":"Promptly tell us if your debit card is lost or stolen, and we&#x27;ll credit unauthorized transactions back to your account. You could see credits as soon as the next business day.[FOOTNOTE||liabilityGuarentee]"}},"securityFeaturesSection":{"grid":[{"heading":{"content":"Fast, secure sign-in"},"body":[{"content":"Log in to our mobile app with Touch ID<sup>®</sup>, Face ID<sup>®</sup> or your fingerprint.[FOOTNOTE||fingerPrintScannerEnrollment]"}]},{"heading":{"content":"Custom alerts"},"body":[{"content":"Set alerts [FOOTNOTE||alertsReceivedTextMessages] for account changes, like unusual activity, payments and more."}]},{"heading":{"content":"Debit card controls"},"body":[{"content":"Lock a [LINK||debitCard] [FOOTNOTE||debitCardControls] to prevent unauthorized use, request a digital card [FOOTNOTE||digitalDebitControl] and more."}]}]},"digitalToolsSection":{"heading":{"content":"Digital tools to help you in your day-to-day"},"grid":[{"heading":{"content":"Better budgeting"},"body":[{"content":"Track your spending with our interactive Spending and Budgeting tool.[FOOTNOTE||budgetingTool]"}]},{"heading":{"content":"Mobile deposits"},"body":[{"content":"Deposit checks with the camera on your device and our mobile app.[FOOTNOTE||mobileDeposits]"}]},{"heading":{"content":"Erica<sup>&reg;</sup> virtual assistant"},"body":[{"content":"Erica [FOOTNOTE||ericaVirtualAssistance] makes it easy for you to stay on top of your finances."}]}]},"manageAccountSection":{"imageLinks":[{"image":{"alt":"Download from Apple App Store"}},{"image":{"alt":"Download from Google Play"}}],"heading":{"content":"Manage your account on the go with our mobile app [FOOTNOTE||mobileBanking]"}},"faqsSqueezeboxTitle":{"content":"Frequently asked questions"},"faqsSqueezebox":{"title":"","titleHeadingTag":"","expandCollapseLink":"visible","adaCaption":"Accordion of frequent questions","panels":[{"label":"What is a checking account and how does it work?","text":"<p>A checking account is a bank account where you can deposit and withdraw your money when you want. It’s the account you’ll likely use to deposit paychecks, pay bills, get cash and transfer funds. Checking accounts usually offer a debit card to use online, at stores and at ATMs. Some checking accounts offer paper checks for making payments. Some checking accounts may earn interest.</p>"},{"label":"How are checking, savings and certificate of deposit (CD) accounts different?","text":"<p>A <b>checking account</b> is for using your money for everyday needs, like making purchases or payments. Checking accounts usually offer a debit card to use online, at stores and at ATMs. Some checking accounts offer paper checks for making payments.</p> <p>A <b>savings account</b> is for setting aside money for longer-term goals. Savings accounts earn interest and may offer an ATM card for making deposits and getting cash.</p> <p>If you have a <b>Bank of America checking and savings account</b>, you can link them together and access both accounts at ATMs with your debit card. However, debit card payments and purchases withdraw from your checking account.</p> <p>A <b>certificate of deposit (CD) account</b> is for setting aside money for a set time — from 1 month to several years. CDs may pay more interest, but your access to your money is limited until the end of the set time."},{"label":"How do I open a Bank of America checking account? Can I open one online?","text":["<p class&#x3D;&#x27;faq-section-margin&#x27;>You can apply for a Bank of America checking account online or at a financial center, with a few exceptions.</p> <p class&#x3D;&#x27;fb-faq-section&#x27;><b class&#x3D;&#x27;fb-faq-section&#x27;>For SafeBalance Banking<sup>&reg;</sup> for Family Banking </b><br>You can only apply online. This account is for existing Bank of America customers. You must already have a personal checking or savings account with us and an Online Banking account login.</p><p><b class&#x3D;&#x27;fb-faq-section&#x27;>For all other Bank of America checking accounts </b><br class&#x3D;&#x27;fb-faq-section&#x27;>If you’re applying with someone under age 13, you must apply at a financial center. Otherwise, you can apply online.</p><p><b>How to apply online </b></p>",{"list":true,"orderedList":true,"content":["Select an account and choose <b>Open now</b> to go to the application.","Enter and verify your information.","Choose features you want to add, like a debit card.","Once approved, make the minimum opening deposit of $25 or $100, depending on the account.","Check your email for next steps."]},"<p><b>How to find a financial center </b><br>We have thousands of financial centers and ATMs across the U.S.<br> [LINK||financialCenter]</p>"]},{"label":"What does FDIC-insured mean?","text":"<p>The Federal Deposit Insurance Corporation (FDIC) is an independent agency of the United States government. If an FDIC-insured bank or savings association fails, the FDIC protects depositors against the loss of their insured deposits. Deposits are automatically insured up to at least $250,000 per depositor, per FDIC-insured bank, per ownership category.</p> <p>FDIC deposit insurance is backed by the United States government. FDIC insurance covers all types of deposit accounts — checking, savings, money market savings and CDs — as well as bank individual retirement accounts (IRAs).</p> <p>Visit [LINK||fdicLink] for more information."}]},"faqsBottomLink":{"content":"Have more questions? Find answers at [LINK||bankofamericahelp]"},"LINKS":{"bofaRewards2":{"ID":"bofa-rewards-short","TARGET":"_blank","CLASS":"spa-link--inline","URL":"https://info.bankofamerica.com/en/bofa-rewards","content":"BofA Rewards™"},"bofaRewards2NoTM":{"ID":"bofa-rewards2-no-TM","TARGET":"_blank","CLASS":"spa-link--inline","URL":"https://info.bankofamerica.com/en/bofa-rewards","content":"BofA Rewards"},"qualifyingDirectDeposit":{"URL":"/{contextRoot}/account-rates-fees-faqs/#qualifying-direct-deposits","content":"qualifying direct deposit"},"learnMoreKeepChange":{"content":"Learn more about Keep the Change&reg;","URL":"{webHost}/{contextRoot}/keep-the-change/"},"learnMoreDeals":{"content":"Learn more about Cash Back Deals","URL":"{webHost}/online-banking/mobile-and-online-banking-features/bankamerideals-cash-back-deals/"},"learnMoreRewards":{"content":"Learn more about BofA Rewards","URL":"https://info.bankofamerica.com/en/bofa-rewards"},"learnMoreOB":{"content":"Enroll now<span class&#x3D;\"ada-hidden\">&nbsp;in online banking</span>","URL":"{secureHost}/auth/enroll/enroll-entry/"},"learnMoreBMH":{"content":"Learn more<span class&#x3D;\"ada-hidden\">&nbsp;about Better Money Habits</span>","URL":"https://bettermoneyhabits.bankofamerica.com/en"},"learnMoreHelp":{"content":"Learn more<span class&#x3D;\"ada-hidden\">&nbsp;about resources on navigating your finances</span>","URL":"https://bettermoneyhabits.bankofamerica.com/en/moving-to-the-us-banking-guide"},"financialCenter":{"URL":"https://locators.bankofamerica.com/","content":"Find a financial center or ATM"},"atFinancialCenter":{"URL":"https://locators.bankofamerica.com/","content":"at a financial center"},"fdicLink":{"URL":"https://www.fdic.gov/","content":"the FDIC"},"bankofamericahelp":{"URL":"{webHost}/help/overview/?request/_locale&#x3D;en/_US","content":"Bank of America Help"},"debitCard":{"URL":"https://promotions.bankofamerica.com/deposits/debitcard/overview","content":"debit card"},"learnMoreAboutStudentBanking":{"content":"Learn more about banking for students and young adults","URL":"{webHost}/student-banking/"},"preferredRewards":{"URL":"https://promotions.bankofamerica.com/preferredrewards/en"},"qualifyingDeposit":{"content":"qualifying direct deposit","URL":"{webHost}/deposits/account-rates-fees-faqs/#qualifying-direct-deposits"},"personalFee":{"URL":"{webHost}/salesservices/deposits/resources/personal-schedule-fees/?request_locale&#x3D;en_US","content":"Personal Schedule of Fees"},"openNowSafeBalance":{"content":"Open now <span class&#x3D;\"ada-hidden\">- SafeBalance Banking for Family Banking</span>"},"openNowAdvantage":{"content":"Open now <span class&#x3D;\"ada-hidden\">- Advantage SafeBalance Banking</span>","URL":"/upac/#/get-started/?productCode&#x3D;FSDPDD00P0W3HNUFL1"},"openNowAdvantagePlus":{"content":"Open now <span class&#x3D;\"ada-hidden\">- Advantage Plus Banking</span>","URL":"/upac/#/get-started/?productCode&#x3D;FSDPDD00PC07DJGB3H1"},"openNowAdvantageRelation":{"content":"Open now <span class&#x3D;\"ada-hidden\">- Advantage Relationship Banking</span>","URL":"/upac/#/get-started/?productCode&#x3D;FSDPDD00P0HDKJ0N41"},"personalScheduleOfFees":{"content":"Personal Schedule of Fees","URL":"/deposits/resources/personal-schedule-fees.go?request_locale&#x3D;en_US"},"clarityStatement":{"content":"Clarity Statement","URL":"/{contextRoot}/checking/checking-clarity-statement/"},"childrensPrivacyPolicy":{"content":"Children&#x27;s Privacy Policy","TARGET":"_blank","CLASS":"spa-link--inline","URL":"https://web.bankofamerica.com/en/privacy/childrens-privacy-notice"},"depositAgreement":{"URL":"{webHost}/salesservices/deposits/resources/deposit-agreements/","content":"Deposit Agreement and Disclosures"},"serviceAgreement":{"URL":"{webHost}/online-banking/service-agreement.go","content":"Online Banking Service Agreement"}},"FOOTNOTES":{"advantageFamilyBanking":{"html":"To open the Advantage SafeBalance Banking® for Family Banking account, you must already have a personal Bank of America checking or savings account. Business and Merrill accounts do not qualify. You must also have an Online Banking login."},"overDraftItemFee":{"html":"While this account prevents you from overdrawing in most cases, there may still be times when your account could have a negative balance. This could happen when the final amount of a transaction differs from the amount that was originally authorized, such as when a tip is added to a restaurant charge. If this happens, we won&#x27;t charge you an Overdraft Item Fee."},"overDraftProtectionBalanceConnect":{"html":"Balance Connect<sup>&reg</sup> for overdraft protection allows you to link your eligible checking account with up to 5 eligible Bank of America accounts for overdraft protection. This optional service can help you cover your payments and purchases and help avoid overdrafts and <span class&#x3D;&#x27;cnx-bold&#x27;>Overdraft Item Fees</span> by automatically transferring available funds from your linked backup account(s) when needed. If your linked backup account does not have enough available funds to cover the necessary amount, we may decline to make the transfer. Transfers from a linked (1) brokerage account with Merrill Lynch that is enrolled in margin lending, (2) Loan Management Account (LMA<sup>&reg</sup>), (3) credit card, or (4) HELOC are subject to interest charges. Please see your account agreement(s) for additional details. Balance Connect<sup>&reg</sup> is not available with SafeBalance Banking<sup>&reg</sup> or SafeBalance Banking<sup>&reg</sup> for Family Banking as a covered or linked backup account. Balance Connect<sup>&reg</sup> is available on Advantage Savings as a linked backup account, but not eligible to be enrolled as a covered account."},"primaryAdvantageRelationshipBanking":{"html":"Bank of America Advantage Relationship<sup>&reg;</sup> Banking and fiduciary accounts, including trust and estate accounts, do not qualify for the Advantage Relationship Banking additional account benefit to waive the monthly maintenance fee."},"noFees":{"html":"No fee for incoming domestic wire transfers, stop payments and other services. Please refer to the [LINK||personalFee] for details."},"budgetingTool":{"html":"The Spending & Budgeting tool is currently available in Online banking and Mobile banking (Android & iPhone only) for customers with checking or savings accounts."},"mobileDeposits":{"html":"Mobile check deposits are subject to verification and not available for immediate withdrawal. Other restrictions apply. In the Mobile Banking app menu, select Menu > Help > Browse More Topics > Mobile Check Deposit for details and other terms and conditions. Message and data rates may apply. For SafeBalance Banking® for Family Banking accounts, the parent owner can make mobile check deposits but their child using the account cannot."},"mobileBanking":{"html":"Mobile Banking requires that you download the Mobile Banking app and is only available for select mobile devices. Message and data fees may apply."},"advantagePreferredRewards":{"html":"For Preferred Rewards members in the Gold, Platinum, or Platinum Honors tiers, the monthly maintenance fee waiver applies to the first 4 checking and 4 savings accounts.  The monthly maintenance fee waiver is unlimited for clients in the Diamond Honors tier.  For Preferred Rewards program eligibility requirements, go to [LINK||preferredRewards]. For SafeBalance Banking® for Family Banking accounts, the parent owner can participate in the Preferred Rewards program but their child using the account cannot.<br><br><div class&#x3D;&#x27;color-gray body-small&#x27;><span class&#x3D;&#x27;roboto-bold-italic&#x27;>Important Information:</span><span class&#x3D;&#x27;roboto-italic&#x27;> On or about May 26, 2026, our Bank of America Preferred Rewards program will become BofA Rewards. All customers with an open, qualifying personal checking account will be eligible for enrollment in BofA Rewards. BofA Rewards will feature the following tiers based on your three-month combined average daily balance in qualifying deposit and investment assets: Member tier, less than $30,000; Preferred Plus tier, $30,000 to $100,000; Preferred Honors tier, $100,000 to $1,000,000; and Premier tier, $1,000,000 or more. If you are enrolled in the Preferred Rewards program on the transition date, your enrollment will be automatically changed to the new BofA Rewards program: current Gold and Platinum tier members will be changed to the Preferred Plus tier; current Platinum Honors members will be changed to the Preferred Honors tier; current Diamond Honors members will be changed to the Premier tier. Your current benefits will change following conversion to BofA Rewards. For BofA Rewards eligibility requirements and a summary of new benefits, please refer to: [LINK||bofaRewards]. Until Preferred Rewards becomes BofA Rewards, customers can only satisfy the balance requirement for Preferred Rewards enrollment through a sufficient three-month combined average daily balance in qualifying deposit and investment accounts. Customers who do not fulfill this requirement will be eligible to enroll in the Member tier of BofA Rewards upon program launch.</span></div>"},"parentOwned":{"html":"We define parent as a parent or legal guardian, and we define child as your child or legal dependent."},"advantageMoneyAvailable":{"html":"While this account prevents you from overdrawing in most cases, there may still be times when your account could have a negative balance. This could happen when the final amount of a transaction differs from the amount that was originally authorized, such as when a tip is added to a restaurant charge. If this happens, we won&#x27;t charge you an Overdraft Item Fee."},"zelleWaysToPay":{"html":"Zelle<sup>&reg;</sup> should only be used to send money to friends, family or others you trust.  We recommend that you do not use Zelle<sup>&reg;</sup> to send money to those you do not know. Transfers require enrollment in the service with a U.S. checking or savings account and must be made from an eligible Bank of America consumer or business deposit account. Transactions between enrolled users typically occur in minutes and transactions between enrolled consumers do not typically incur transaction fees from Bank of America. We will send you an email alert with transaction details after you send money using Zelle<sup>&reg;</sup>. Dollar and frequency limits apply. See the [LINK||serviceAgreement] for further details. Data connection required. Message and data rates may apply.  Neither Bank of America nor Zelle<sup>&reg;</sup> offers purchase protection for payments made with Zelle<sup>&reg;</sup>. Please treat Zelle<sup>&reg;</sup> payments like cash, once you send the money, you are unlikely to get it back – for example, you do not receive the item you paid for using Zelle<sup>&reg;</sup> or the item received is not as described. Regular account fees apply. Zelle and the Zelle related marks are wholly owned by Early Warning Services, LLC and are used herein under license."},"depositAgreement":{"html":"The [LINK||depositAgreement] as well as the [LINK||personalFee] provide details about transaction processing and posting. They also explain how and when overdrafts may be paid, and how and when overdraft fees are assessed."}},"jcr":"copy/site/deposits-v6/pages/advantage-banking/en/advantage-banking.json"}}'></div></div></div></section><section class="foot-row small-centered"><div class="row small-collapse"><div class="column"><div id="zipCodeSelectorModule" data
