mplate/header-footer-template/header-footer.json"},"headerFooterText":{"FOOTNOTES":{"backToContentText":"Back to content","bofaRewardsFootnote":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||bofaRewards2NoTM]."},"fiveYearHoldingPeriod":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.five-year-holding-period-roth-ira.html"},"fudiciaryUnder25":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the Advantage Relationship Banking additional account benefit or the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"advantageRelationshipBanking":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||footer_dp_bofaRewards]."},"annualPercentageYield":{"html":"Annual Percentage Yield (APY) is accurate as of {annualPercentageYieldTimeStamp.value::XXXX}. These rates may change at any time without prior notice. Fees could reduce earnings on the account."},"lifePlanForSwitchBank":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.LifePlan.html"},"mobileErica":{"contentReq":"disclosures.manifests.salesonb.online-banking","contentKey":"footnotes.erica-language-support.html"},"earnRewards":{"html":"You must be enrolled in Online Banking or Mobile Banking to participate in the deals program and have either an eligible Bank of America<sup>®</sup> debit/credit card or Merrill credit card. Earned cash back will be credited into an eligible consumer deposit or credit account within 30 days following redemption. This deals program may not include deals available through other rewards programs. Data connection required. Wireless carrier fees may apply. For SafeBalance Banking<sup>®</sup> for Family Banking accounts, the parent owner can participate in the deals program but their child using the account cannot."},"ericaVirtualAssistance":{"html":"The mobile feature, Erica, is only available in the English language. This feature requires that you download the latest version of the Mobile Banking app and is only available for select mobile devices.  Message and data rates may apply. Your chat may be monitored for quality assurance. For SafeBalance Banking® for Family Banking accounts, the parent owner and their child age 13 or older have access to Erica."},"fingerPrintScannerEnrollment":{"html":"Certain devices are eligible for enrollment in Touch ID<sup>&reg;</sup>, Face ID<sup>&reg;</sup> or fingerprint login. If eligible, you will have the option to enroll by following the prompts within the Mobile Banking app. If you store multiple fingerprints on your device including those of additional persons, those persons will also be able to access your Bank of America Mobile Banking app via fingerprint, including the ability to access a call center, when Touch ID<sup>&reg;</sup> or fingerprint is enabled. Data connection required. Wireless carrier fees may apply."},"alertsReceivedTextMessages":{"html":"You may elect to receive alerts via text or email. Bank of America does not charge for this service, but your mobile carrier&#x27;s message and data rates may apply. Delivery of alerts may be affected or delayed by your mobile carrier’s coverage."},"debitCardControls":{"html":"We may allow you to lock your physical debit card or virtual cards. You must lock each card type individually. Locking your physical card will not lock your virtual cards.  Similarly, locking a virtual card will not lock your physical card or any other distinct virtual card. Each virtual card must be locked individually. We may provide you the ability to apply or remove a lock at your discretion via Online and/or Mobile banking.  Locking your physical debit card will not lock or prevent transactions from being authorized using your digital card for debit or for any virtual cards stored in digital wallets. Locking your card is not a replacement for reporting your card lost or stolen. This feature is available on the Mobile App for iPad, iPhone and Android devices and Online Banking for your physical debit card and on the Mobile Banking app only for your digital card. Data connection required for Mobile app and wireless carrier fees may apply."},"liabilityGuarentee":{"html":"Notify us within a reasonable time of the unauthorized use or the loss or theft of your card, card number or PIN. Certain restrictions apply. Consult your account documents for details. "},"fiduciaryAccounts":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing Advantage SafeBalance Banking<sup>&reg;</sup> account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"featuredCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value
