  "@context": "https://schema.org",
  "@type": "FAQPage",
  "name": "Self-Service ATMs: Accessibility, Limits, & Features",
  "description": "Learn more about automated teller machines (ATM) from Bank of America, including transaction capabilities, withdrawal limits, fees, and accessibility features.",
  "keywords": "atm bank of america, atm withdrawal limit, atm fee,wfid24580302",
  "url": "/www.bankofamerica.com/deposits/self-service-atms/",
  "image": "/www.bankofamerica.com/content/images/ContextualSiteGraphics/Logos/en_US/logos/colored_flagscape-v2.png",
  "mainEntity": [
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What transactions can I complete at Bank of America ATMs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You can get cash, deposit cash and checks, make transfers between accounts, check account balances and make a payment to your Bank of America credit card.</p><p>You can also manage your ATM preferences to customize your ATM experience, change your ATM/debit card PIN and view nearby ATM locations.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Are there any fees for using an ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>There are no fees for Bank of America customers using one of thousands of Bank of America ATMs to transfer funds, make deposits, inquire about a balance and withdraw cash. <a href='https://locators.bankofamerica.com/'>Find a Bank of America ATM</a></p><p>The following fees may apply when using a non-Bank of America ATM in the United States:</p> <ul><li>ATM operator fee</li> <li>Non-Bank of America ATM fee for a withdrawal, transfer or balance inquiry</li><li>Other account fees, such as excess withdrawal fee from savings</li></ul> <p>Refer to the <a href='/www.bankofamerica.com/deposits/account-fees/'>Personal Schedule of Fees</a> for additional information.</p><p><a href='/www.bankofamerica.com/deposits/debit-card-faqs/'>View our FAQs about debit cards</a></p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Do Bank of America ATMs comply with the Americans with Disabilities Act?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Yes. Bank of America strives to make ATMs accessible for all our customers. <a href='/www.bankofamerica.com/accessiblebanking/atm-banking-centers.go'>Learn more about Accessible Banking</a></p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What is the maximum amount of money I can withdraw from an ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>The amount you can withdraw from an ATM is based on several factors, including limits that are set based on your card or account type, availability of funds in your account at the time the withdrawal is requested and in some cases the amount the ATM is capable of dispensing.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I increase or decrease the amount I can withdraw at an ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You may increase or decrease the limit you can withdraw at an ATM in the following ways:</p> <ul> <li>Log in to the Mobile Banking app and select <strong>Menu</strong> then <strong>Manage Debit/Credit Card</strong>. Ensure your debit card is unlocked to <strong>Set Limits</strong>.</li> <li><a href='https://secure.bankofamerica.com/login/sign-in/signOnV2Screen.go'>Log in to Online Banking</a> and go to the <strong>Information & Services</strong> tab for your account, then select <strong>Set daily purchase and ATM withdrawal limits</strong> in <strong>Manage card settings</strong>.</li> <li><a href='/www.bankofamerica.com/contactus/contactus.go?topicId=checking_savings'>Contact customer service</a></li> <li>Visit a <a href='https://locators.bankofamerica.com/'>financial center</a></li></ul>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I set a Cash Preference?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Setting a Cash Preference enables you to set a preference for a specific dollar amount you commonly withdraw. Once you've set a Cash Preference amount, this preferred amount will appear on the PIN entry screen and also on <strong>'How much cash do you want?'</strong> during a <strong>Get cash</strong> withdrawal selected from the ATM's main menu. Simply enter your PIN and then tap your preferred amount to speed up your withdrawal. In some cases, the maximum Cash Preference amount that can be set may be lower than your ATM daily withdrawal limit. To change your preferred Cash Preference amount at any time, visit a Bank of America ATM and start your transaction as you normally would. Select <strong>View more</strong> from the main menu, <strong>Manage preferences</strong>, then <strong>Cash preference</strong>, <a href='/www.bankofamerica.com/deposits/self-service-atms/#how-do-i-set-my-atm-preferences'>See how to set your ATM preferences</a></p><p>You will also be presented with additional withdrawal amount options on the PIN entry screen. You can quickly select one of the offered options, rather than going to the ATM's main menu to complete your withdrawal. If you need to withdraw money from an account other than the primary checking account assigned to your debit card, follow the <strong>Get cash</strong> prompts on the ATM's main menu.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What denominations are available at Bank of America ATMs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>When getting cash at a Bank of America ATM, you will have the ability to choose what bill types you would like for your withdrawal. Most of our ATMs have $10s, $20s or $100s available for selection, but sometimes there are exceptions. If there is more than one denomination to choose from at the time of your withdrawal, you will have the opportunity to select it in all of the same bill type (for example, in all $10s), choose a custom selection, or allow the ATM to pick for you.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I use the Mobile Banking app to get cash at a Bank of America ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Setting up ATM withdrawals through our Mobile Banking app is easy—and can save you time when you're on the go. Here's how:</p><ol><li>Log in to our Mobile Banking app and select the checking or savings account from which you would like to get cash.<sup><a href='/www.bankofamerica.com/deposits/self-service-atms/#ftn_atmWithdrawalFromCheckingOrSavings_content'>[1]</a></sup></li><li>Scroll to the ATM section and select <strong>GET CASH</strong>.</li><li>When asked <strong>'How much cash do you want?,'</strong> simply select a pre-filled dollar amount or enter an <strong>Other Amount</strong>. (Dollar amounts lower than the account's available balance and/or the card's daily ATM withdrawal limit will be available for selection in increments of $20.)</li><li>Select your preferred receipt type: <strong>Email Receipt, Paper Receipt</strong> or <strong>No Receipt</strong>.</li></ol><p>Please note:</p><ul><li>If cash is not picked up within 24 hours the Mobile Banking app setup for your ATM withdrawal will expire.</li><li>Setting up your withdrawal in the Mobile Banking app doesn't deduct or hold funds in your account. Funds are debited from your account when you complete your withdrawal at any Bank of America ATM.</li><li>The available balance in your account is confirmed during setup, but if funds are no longer sufficient to complete your withdrawal at the time of pickup your transaction may be declined.</li><li>You don't need to be logged in to the Mobile Banking app in order to pick up your cash.</li><li>Once you arrive at a Bank of America ATM, insert your card into the card reader (the same card you selected when setting your withdrawal up in the app), tap your contactless card on the contactless reader or hold your mobile device's digital wallet over the contactless reader. Follow the ATM on-screen prompts to enter your debit card PIN and pick up your cash. Please note that if you're using a digital wallet, you must have your debit card selected. <a href='/www.bankofamerica.com/deposits/self-service-atms/#use-digital-debit-card-in-digital-wallet'>See how to use your digital wallet at the ATM</a></li></ul>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can someone else pick up my cash if I set up an ATM withdrawal using the Bank of America Mobile Banking app?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>No. For your security, you're required to use your Bank of America ATM/debit card or digital wallet and also enter your ATM/debit card PIN when picking up your cash at a Bank of America ATM.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What types of deposits are made available on the same day as my deposit?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Cash deposits are available immediately.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What types of deposits are made available on the next business day after my deposit?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>For information about funds availability and holds that might be placed on your deposit, please visit our <a href='/www.bankofamerica.com/deposits/deposit-holds-faqs/'>deposit holds FAQs page</a>.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "What determines when my funds will be made available?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Banks are governed by federal regulations affecting the availability of funds. Bank of America considers factors such as type of deposit, deposit amount and customer relationship. Bank of America strives to make funds available as quickly as possible for our customers.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can I deposit foreign checks or foreign currency into my Bank of America account at an ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>No, we do not accept foreign checks or foreign currency at ATMs. You may visit a <a href='https://locators.bankofamerica.com/'>financial center</a> for more information about depositing foreign checks and to exchange your foreign currency for U.S. dollars in order to make your deposit.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can I split the money from my deposit into multiple accounts?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You will need to deposit all of your funds into one of your accounts, then you can transfer available funds to your other Bank of America accounts at the ATM or by signing in to Mobile or Online Banking.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can I deposit coins at the ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>No. Please take rolled coins to your local <a href='https://locators.bankofamerica.com/'>financial center</a>. Incomplete rolls or loose coins may not be accepted.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Is it possible to request a receipt with or without check image(s)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Yes. When you request a printed receipt for a deposit including check(s), you will be prompted to choose one with or without check image(s). You can also save your preference for future check deposits.</p><p>If you want to change your preference at any time, simply tap <strong>Change print setting</strong> on the <strong>Receipt Options</strong> screen during your ATM check deposit transaction.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Will images of my checks deposited at the ATM be available in Mobile and Online Banking?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Yes. Digital images of checks deposited at the ATM are typically available in Online Banking and in the Mobile Banking app. Occasionally, though, a digital image may not be visible. If the deposit is processing or has posted, but you're unable to see the check image, don't worry; everything is okay. If you require an image of the check or have questions regarding the transaction, <a href='/www.bankofamerica.com/contactus/contactus.go?topicId=checking_savings'>contact customer service </a> for assistance.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I transfer money at an ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You can transfer money between your Bank of America accounts once you have linked these accounts to your ATM/debit card for ATM access. Visit your local <a href='https://locators.bankofamerica.com/'>financial center</a> or <a href='/www.bankofamerica.com/contactus/contactus.go?topicId=checking_savings'>contact customer service</a> for assistance linking or unlinking your accounts.</p> <p>Once accounts are linked, select <strong>Make transfer</strong> from the ATM main menu, and then simply select the account from which you want to transfer money and the account into which you want the money to go. Next, enter the dollar amount of the transfer. There may be charges or fees associated with certain types of transfers, so be sure to review all disclosures presented on the ATM screens before continuing with your transfer.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "How do I make a payment to my credit card or home equity line of credit at the ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>You can make Bank of America credit card payments at our ATMs with only your Bank of America credit card, using a check or cash. Simply visit your local Bank of America ATM, insert your credit card and select <strong>Make a Payment</strong>. Please note that payments to business credit cards are not supported at this time.</p> <p>If your credit card or home equity line of credit account is linked to your ATM/debit card, you can also make a payment at the ATM using the <strong>Make Transfers</strong> option. Simply select a checking or savings account as the <strong>Transfer FROM</strong> account and your credit card or home equity line of credit account as the <strong>Transfer TO</strong> account.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can I change my PIN at the ATM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Yes. Simply start your transaction as you normally would, select <strong>View more</strong> from the main menu and then <strong>Change PIN</strong>. You must correctly enter your current PIN before you can create a new PIN.</p>"
      }

xt":"Back to content","bofaRewardsFootnote":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||bofaRewards2NoTM]."},"fiveYearHoldingPeriod":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.five-year-holding-period-roth-ira.html"},"fudiciaryUnder25":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the Advantage Relationship Banking additional account benefit or the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"advantageRelationshipBanking":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||footer_dp_bofaRewards]."},"annualPercentageYield":{"html":"Annual Percentage Yield (APY) is accurate as of {annualPercentageYieldTimeStamp.value::XXXX}. These rates may change at any time without prior notice. Fees could reduce earnings on the account."},"lifePlanForSwitchBank":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.LifePlan.html"},"mobileErica":{"contentReq":"disclosures.manifests.salesonb.online-banking","contentKey":"footnotes.erica-language-support.html"},"earnRewards":{"html":"You must be enrolled in Online Banking or Mobile Banking to participate in the deals program and have either an eligible Bank of America<sup>®</sup> debit/credit card or Merrill credit card. Earned cash back will be credited into an eligible consumer deposit or credit account within 30 days following redemption. This deals program may not include deals available through other rewards programs. Data connection required. Wireless carrier fees may apply. For SafeBalance Banking<sup>®</sup> for Family Banking accounts, the parent owner can participate in the deals program but their child using the account cannot."},"ericaVirtualAssistance":{"html":"The mobile feature, Erica, is only available in the English language. This feature requires that you download the latest version of the Mobile Banking app and is only available for select mobile devices.  Message and data rates may apply. Your chat may be monitored for quality assurance. For SafeBalance Banking® for Family Banking accounts, the parent owner and their child age 13 or older have access to Erica."},"fingerPrintScannerEnrollment":{"html":"Certain devices are eligible for enrollment in Touch ID<sup>&reg;</sup>, Face ID<sup>&reg;</sup> or fingerprint login. If eligible, you will have the option to enroll by following the prompts within the Mobile Banking app. If you store multiple fingerprints on your device including those of additional persons, those persons will also be able to access your Bank of America Mobile Banking app via fingerprint, including the ability to access a call center, when Touch ID<sup>&reg;</sup> or fingerprint is enabled. Data connection required. Wireless carrier fees may apply."},"alertsReceivedTextMessages":{"html":"You may elect to receive alerts via text or email. Bank of America does not charge for this service, but your mobile carrier&#x27;s message and data rates may apply. Delivery of alerts may be affected or delayed by your mobile carrier’s coverage."},"debitCardControls":{"html":"We may allow you to lock your physical debit card or virtual cards. You must lock each card type individually. Locking your physical card will not lock your virtual cards.  Similarly, locking a virtual card will not lock your physical card or any other distinct virtual card. Each virtual card must be locked individually. We may provide you the ability to apply or remove a lock at your discretion via Online and/or Mobile banking.  Locking your physical debit card will not lock or prevent transactions from being authorized using your digital card for debit or for any virtual cards stored in digital wallets. Locking your card is not a replacement for reporting your card lost or stolen. This feature is available on the Mobile App for iPad, iPhone and Android devices and Online Banking for your physical debit card and on the Mobile Banking app only for your digital card. Data connection required for Mobile app and wireless carrier fees may apply."},"liabilityGuarentee":{"html":"Notify us within a reasonable time of the unauthorized use or the loss or theft of your card, card number or PIN. Certain restrictions apply. Consult your account documents for details. "},"fiduciaryAccounts":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing Advantage SafeBalance Banking<sup>&reg;</sup> account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"featuredCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC2K2FDVRI1.timeStamp::XXXX} and applies to the initial term of a new Featured CD. We may limit the amount you deposit in one or more Featured CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"flexibleCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1ST639A1B2.timeStamp::XXXX} and applies to the initial term of a new Flexible CD. Flexible CDs have a 12 month term. We may change the interest rate and APY at any time before account opening without prior notice. The minimum balance required to open a Flexible CD is {epcTokens.value.FSDPTDZZC1ST639A1B2.cdProductAttributes.minimumOpeningBalance::$XXXX}. We may limit the amount you deposit in one or more Flexible CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Deposits are insured by the FDIC up to $250,000 per depositor. Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. See [LINK||depositAgreement] and [LINK||depositsRateSheet] for more detail."},"standardCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1078F31GD1.timeStamp::XXXX} and applies to the initial term of a new Fixed Term CD. We may limit the amount you deposit in one or more Fixed CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"digitalDebitControl":{"html":"Customers enrolled in Mobile Banking may opt to receive the digital card for debit, a virtual card that that can be accessed anytime in Mobile Banking. The digital card for debit is designed for you to always have access to your digital card credentials to make online purchases, including when you’ve just requested a new or replacement physical card and haven’t received it yet. Some transaction types may not be supported by the digital card for debit. Digital card for debit cannot be used for in person sales unless it’s added/loaded to your digital wallet. You must have a physical debit card or have ordered a new or replacement physical debit card to get a digital card for debit. Not all clients are eligible for a digital card for debit."}},"siteHeader":{"menuLinks":{"sections":[{"heading":{"content":"Top Deposit Links"}},{"heading":{"content":"Other Deposit Links"}}]}},"siteFooter":{"menuLinks":{"sections":[{"heading":{"content":"Checking"}},{"heading":{"content":"Savings"}},{"heading":{"content":"CDs"}},{"heading":{"content":"IRAs"}},{"heading":{"content":"Managing Your Account"}},{"heading":{"content":"Access Accounts"}}]}},"LINKS":{"bofaRewards2":{"ID":"bofa-rewards-short","TARGET":"_blank","CLASS":"spa-link--inline","URL":"/www.bankofamerica.com/BofARewards","content":"BofA Rewards™"},"bofaRewards2NoTM":{"ID":"bofa-rewards2-no-TM","TARGET":"_blank","CLASS":"spa-link--inline","URL":"https://info.bankofamerica.com/en/bofa-rewards","content":"BofA Rewards"},"ftnlink_personalScheduleOfFees":{"URL":"{webHost}/salesservices/deposits/resources/personal-schedule-fees/","content":"Personal Schedule of Fees"},"ftnlink_preferredRewards":{"URL":"https://promotions.bankofamerica.com/preferredrewards/en"},"ftnlink_termsOfUse":{"URL":"{webHost}/online-banking/service-agreement.go","content":"program terms of use"},"depositAgreement":{"URL":"/deposits/resources/deposit-agreements.go?request_locale&#x3D;en_US","content":"Deposit Agreement and Disclosures","REL":"noopener noreferrer"},"depositsRateSheet":{"URL":"/{contextRoot}/bank-account-interest-rates/","content":"Deposit Rate Sheet"},"header-account-rates":{"URL":"/{contextRoot}/bank-account-interest-rates/","content":"Account Rates"},"header-account-fees":{"URL":"/{contextRoot}/account-fees/ ata":{"bactmln":"Should_I_get_foreign_currency_before_I_travel"}},{"slug":"using-atm-travelling-to-us","data":{"bactmln":"I&#x27;m_traveling_to_the_US_from_another_country_Can_I_use_a_Bank_of_America_ATM_if_I&#x27;m_not_a_Bank_of_America_customer"}}]},{"innerPanels":{"type":"accordion","color":"transparent","expandCollapseLink":"visible"},"content":[{"slug":"protect-atm-card-pin","data":{"bactmln":"Protect_your_ATM_card_and_personal_identification_number_(PIN)"}},{"slug":"be-aware-of-surroundings-atm","data":{"bactmln":"Be_aware_of_your_surroundings_at_ATMs"}},{"slug":"protect-your-privacy","data":{"bactmln":"Protect_your_privacy"}},{"slug":"request-emergency-assistance","data":{"bactmln":"Request_emergency_assistance"}}]}]},"faqsCta":{"link":{"id":"getApp"}},"LINKS":{"findAnAtm":{"ID":"findAnAtm","TARGET":"_blank","CLASS":"spa-link--inline"},"findAnAtm2":{"ID":"findAnAtm2","TARGET":"_blank","CLASS":"spa-link--inline"},"personalScheduleFees":{"ID":"personalScheduleFees","TARGET":"_blank","CLASS":"spa-link--inline"},"debitCardFaqs":{"ID":"debitCardFaqs","TARGET":"_blank","CLASS":"spa-link--inline"},"learnAccessibleBanking":{"ID":"learnAccessibleBanking","URL":"/accessiblebanking/atm-banking-centers.go","CLASS":"spa-link--inline"},"learnAccessibleBanking2":{"ID":"learnAccessibleBanking2","URL":"/accessiblebanking/atm-banking-centers.go","CLASS":"spa-link--inline"},"signInToOnlineBanking":{"ID":"signInToOnlineBanking","TARGET":"_blank","CLASS":"spa-link--inline"},"signInToOnlineBanking2":{"ID":"signInToOnlineBanking2","TARGET":"_blank","CLASS":"spa-link--inline"},"signingIntoOnlineBanking":{"ID":"signingIntoOnlineBanking","TARGET":"_blank","CLASS":"spa-link--inline"},"contactCustomerService":{"ID":"contactCustomerService","URL":"/contactus/contactus.go?topicId&#x3D;checking_savings","CLASS":"spa-link--inline"},"contactCustomerService2":{"ID":"contactCustomerService2","URL":"/contactus/contactus.go?topicId&#x3D;checking_savings","CLASS":"spa-link--inline"},"contactCusto nd_debit_cards","CLASS":"spa-link--inline"},"findAMastercardOrCirrusAtm":{"ID":"findAMastercardOrCirrusAtm","URL":"http://www.mastercard.com/atm","actionType":{"type":"layer","options":{"interstitialBranding":"default","targetAction":"new-tab"}},"CLASS":"spa-link--inline"},"findAVisaAtm":{"ID":"findAVisaAtm","actionType":{"type":"layer","options":{"interstitialType":"leaving-site","interstitialBranding":"default","targetAction":"new-tab"}},"CLASS":"spa-link--inline"},"howToChangeYourPin":{"ID":"howToChangeYourPin","URL":"#change-pin-at-atm","CLASS":"spa-link--inline"},"learnMoreAboutOrderingForeignCurrency":{"ID":"learnMoreAboutOrderingForeignCurrency","URL":"/foreign-exchange/foreign-currency-exchange.go","CLASS":"spa-link--inline"},"learnMoreAboutOrderingForeignCurrency2":{"ID":"learnMoreAboutOrderingForeignCurrency2","URL":"/foreign-exchange/foreign-currency-exchange.go","CLASS":"spa-link--inline"},"exchangeRates":{"ID":"exchangeRates","URL":"/foreign-exchange/currency-converter.go","CLASS":"spa-link--inline"},"replacementCardPhone":{"ID":"replacementCardPhone","URL":"/contactus/contactus.go?topicId&#x3D;checking_savings","CLASS":"spa-link--inline"},"replacementCardOnline":{"ID":"replacementCardOnline","TARGET":"_blank","CLASS":"spa-link--inline"},"visitYourLocalBankOfAmericaAtm":{"ID":"visitYourLocalBankOfAmericaAtm","TARGET":"_blank","CLASS":"spa-link--inline"},"contactingCustomerService":{"ID":"contactingCustomerService","URL":"/contactus/contactus.go?topicId&#x3D;checking_savings","CLASS":"spa-link--inline"},"enrollOnlineBanking":{"ID":"enrollOnlineBanking","TARGET":"_blank","CLASS":"spa-link--inline"},"signIntoOnlineBanking":{"ID":"signIntoOnlineBanking","TARGET":"_blank","CLASS":"spa-link--inline"}},"jcr":"copy/site/deposits-v6/pages/faqs/self-service-atms-faqs.json"},"pageText":{"engagement":{"eyebrow":{"content":"Self-Service ATMs"}},"faqsSqueezebox":{"panels":[{"label":"ATM basics: Transactions, fees & accessibility","content":[{"label":"What transactions can I complete at Bank of America ATMs?","content":"<p>You can get cash, deposit cash and checks, make transfers between accounts, check account balances and make a payment to your Bank of America credit card.</p><p>You can also manage your ATM preferences to customize your ATM experience, change your ATM/debit card PIN and view nearby ATM locations.</p>"},{"label":"Are there any fees for using an ATM?","content":"<p>There are no fees for Bank of America customers using one of thousands of Bank of America ATMs to transfer funds, make deposits, inquire about a balance and withdraw cash. [LINK||findAnAtm]</p><p>The following fees may apply when using a non-Bank of America ATM in the United States:</p><ul><li>ATM operator fee</li><li>Non-Bank of America ATM fee for a withdrawal or transfer</li></ul><p>Refer to the [LINK||personalScheduleFees] for additional information.</p><p>[LINK||debitCardFaqs]</p>"},{"label":"Do Bank of America ATMs comply with the Americans with Disabilities Act?","content":"<p>Yes. Bank of America strives to make ATMs accessible for all our customers. [LINK||learnAccessibleBanking]</p>"}]},{"label":"Getting cash at an ATM","content":[{"label":"What is the maximum amount of money I can withdraw at an ATM?","content":"<p>The amount you can withdraw from an ATM is based on several factors, including limits that are set based on your card or account type, availability of funds in your account at the time the withdrawal is requested and in some cases the amount the ATM is capable of dispensing.</p>"},{"label":"How do I increase or decrease the amount I can withdraw at an ATM?","content":"<p>You may increase or decrease the limit you can withdraw daily at an ATM in the following ways:</p><ul><li>Log in to the Mobile Banking app and select <span class&#x3D;&#x27;cnx-bold&#x27;>Menu</span> then <span class&#x3D;&#x27;cnx-bold&#x27;>Manage Debit/Credit Card</span>. Ensure your debit card is unlocked to <span class&#x3D;&#x27;cnx-bold&#x27;>Set Limits</span>.</li><li>[LINK||signInToOnlineBanking] and go to the <span class&#x3D;&#x27;cnx-bold&#x27;>Information & Services</span> tab for your account, then select <span class&#x3D;&#x27;cnx-bold&#x27;>Set daily purchase and ATM withdrawal limits</span> in <span class&#x3D;&#x27;cnx-bold&#x27;>Manage card settings.</span></li><li>[LINK||contactCustomerService]</li><li>Visit a [LINK||financialCenter]</li></ul>"},{"label":"How do I set a Cash Preference?","content":"<p>Setting a Cash Preference enables you to set a preference for a specific dollar amount you commonly withdraw. Once you&#x27;ve set a Cash Preference amount, this preferred amount will appear on the PIN entry screen and also on <span class&#x3D;&#x27;cnx-bold&#x27;>\"How much cash do you want?\"</span> during a <span class&#x3D;&#x27;cnx-bold&#x27;>Get cash</span> withdrawal selected from the ATM&#x27;s main menu. Simply enter your PIN and then tap your preferred amount to speed up your withdrawal. In some cases, the maximum Cash Preference amount that can be set may be lower than your ATM daily withdrawal limit. To change your preferred Cash Preference amount at any time, visit a Bank of America ATM and start your transaction as you normally would. Select <span class&#x3D;&#x27;cnx-bold&#x27;>View more</span> from the main menu, <span class&#x3D;&#x27;cnx-bold&#x27;>Manage preferences</span>, then <span class&#x3D;&#x27;cnx-bold&#x27;>Cash preference</span>, [LINK||setAtmPreferences]</p><p>You will also be presented with additional withdrawal amount options on the PIN entry screen. You can quickly select one of the offered options, rather than going to the ATM&#x27;s main menu to complete your withdrawal. If you need to withdraw money from an account other than the primary checking account assigned to your debit card, follow the <span class&#x3D;&#x27;cnx-bold&#x27;>Get cash</span> prompts on the ATM&#x27;s main menu.</p>"},{"label":"What denominations are available at Bank of America ATMs?","content":"<p>When getting cash at a Bank of America ATM, you will have the ability to choose what bill types you would like for your withdrawal. Most of our ATMs have $10s, $20s or $100s available for selection, but sometimes there are exceptions. If there is more than one denomination to choose from at the time of your withdrawal, you will have the opportunity to select it in all of the same bill type (for example, in all $10s), choose a custom selection, or allow the ATM to pick for you.</p>"}]},{"label":"Making deposits at an ATM","content":[{"label":"What types of deposits are made available on the same day as my deposit?","content":"<p>Cash deposits are available immediately.</p>"},{"label":"What types of deposits are made available on the next business day after my deposit?","content":"<p>For information about funds availability and holds that might be placed on your deposit, please visit our [LINK||depositHoldsFaqs].</p>"},{"label":"What determines when my funds will be made available?","content":"<p>Banks are governed by federal regulations affecting the availability of funds. Bank of America considers factors such as type of deposit, deposit amount and customer relationship. Bank of America strives to make funds available as quickly as possible for our customers.</p>"},{"label":"Can I deposit foreign checks or foreign currency into my Bank of America account at an ATM?","content":"<p>No, we do not accept foreign checks or foreign currency at ATMs. You may visit a [LINK||financialCenter2] for more information about depositing foreign checks and to exchange your foreign currency for U.S. dollars in order to make your deposit.</p>"},{"label":"Can I split the money from my deposit into multiple accounts?","content":"<p>You will need to deposit all of your funds into one of your accounts, then you can transfer available funds to your other Bank of America accounts at the ATM or by signing in to Mobile or Online Banking.</p>"},{"label":"Can I deposit coins at the ATM?","content":"<p>No. Please take rolled coins to your local [LINK||financialCenter3]. Incomplete rolls or loose coins may not be accepted.</p>"},{"label":"Is it possible to request a receipt with or without check image(s)?","content":"<p>Yes. When you request a printed receipt for a deposit including <span>check(s),</span> you will be prompted to choose one with or without check <span>image(s).</span> You can also save your preference for future check deposits.</p><p>If you want to change your preference at any time, simply tap <span class&#x3D;&#x27;cnx-bold&#x27;>Change print setting</span> on the <span class&#x3D;&#x27;cnx-bold&#x27;>Receipt Options</span> screen during your ATM check deposit transaction.</p>"},{"label":"Will images of my checks deposited at the ATM be available in Mobile and Online Banking?","content":"<p>Yes. Digital images of checks deposited at the ATM are typically available in Online Banking and in the Mobile Banking app. Occasionally, though, a digital image may not be visible. If the deposit is processing or has posted, but you&#x27;re unable to see the check image, don&#x27;t worry; everything is okay. If you require an image of the check or have questions regarding the transaction, [LINK||contactCustomerService2] for assistance.</p>"}]},{"label":"Making transfers and credit card payments at an ATM","content":[{"label":"How do I transfer money at an ATM?","content":"<p>You can transfer money between your Bank of America accounts once you have linked these accounts to your ATM/debit card for ATM access. Visit your local [LINK||financialCenter4] or [LINK||contactCustomerService3] for assistance linking or unlinking your accounts.</p><p>Once accounts are linked, select <span class&#x3D;&#x27;cnx-bold&#x27;>Make transfer</span> from the ATM main menu, and then simply select the account from which you want to transfer money and the account into which you want the money to go. Next, enter the dollar amount of the transfer. There may be charges or fees associated with certain types of transfers, so be sure to review all disclosures presented on the ATM screens before continuing with your transfer.</p>"},{"label":"How do I make a payment to my credit card or home equity line of credit at the ATM?","content":"<p>You can make Bank of America credit card payments at our ATMs with only your Bank of America credit card, using a check or cash. Simply [LINK||visitYourLocalBankOfAmericaAtm], insert your credit card and select <span class&#x3D;&#x27;cnx-bold&#x27;>Make a Payment</span>. Please note that payments to business credit cards are not supported at this time.</p><p>If your credit card or home equity line of credit account is linked to your ATM/debit card, you can also make a payment at the ATM using the <span class&#x3D;&#x27;cnx-bold&#x27;>Make Transfers</span> option. Simply select a checking or savings account as the <span class&#x3D;&#x27;cnx-bold&#x27;>Transfer FROM</span> account and your credit card or home equity line of credit account as the <span class&#x3D;&#x27;cnx-bold&#x27;>Transfer TO</span> account.</p>"}]},{"label":"Customizing your ATM experience","content":[{"label":"How do I set my ATM preferences?","content":"<p>To customize your ATM experience, visit any Bank of America ATM and start your transaction as you normally would. Select <span class&#x3D;&#x27;cnx-bold&#x27;>View more</span> from the main menu, then <span class&#x3D;&#x27;cnx-bold&#x27;>Manage preferences</span>. You&#x27;ll be able to customize your ATM experience in the following ways:</p><p><span class&#x3D;&#x27;cnx-bold&#x27;>Cash preference amount</span> is an amount that appears on the PIN entry screen and also on <span class&#x3D;&#x27;cnx-bold&#x27;>\"How much cash do you want?\"</span> during a <span class&#x3D;&#x27;cnx-bold&#x27;>Get cash</span> withdrawal selected from the ATM&#x27;s main menu. Setting a Cash preference amount helps to speed up your withdrawal if you commonly withdraw a preferred dollar amount.</p><p><span class&#x3D;&#x27;cnx-bold&#x27;>Receipt preference</span> allows you to select one of the following options, which applies to all transactions:</p><ul><li>No preference, always ask (choose this option if you prefer receiving your receipt via email)</li><li>Always print</li><li>No receipt</li></ul><p><span class&#x3D;&#x27;cnx-bold&#x27;>Language preference</span> allows you to select one of the following languages which applies to your entire ATM experience:</p><ul><li>English (US)</li><li>Spanish (US)</li><li>Traditional Chinese (Taiwan)</li><li>French (Canada)</li><li>Korean</li><li>Portuguese (Brazil)</li><li>Russian</li></ul><p><span class&#x3D;&#x27;cnx-bold&#x27;>Audio screen display</span> provides you with the option to either blank or display your screens during your voice-guided transactions if you&#x27;re using earbuds or headphones at our Audio ATMs. [LINK||learnAccessibleBanking2]</p>"},{"label":"Can I change my PIN at the ATM?","content":"<p>Yes. Simply start your transaction as you normally would, select <span class&#x3D;&#x27;cnx-bold&#x27;>View more</span> from the main menu and then <span class&#x3D;&#x27;cnx-bold&#x27;>Change PIN</span>. You must correctly enter your current PIN before you can create a new PIN.</p>"}]},{"label":"Getting email receipts at an ATM","content":[{"label":"Can I have ATM receipts sent to my email?","content":"<p>Yes, email receipts can be requested during eligible ATM transactions if you have at least one email address saved as part of your Mobile or Online Banking contact information and you&#x27;re conducting a transaction using your Bank of America consumer debit/ATM card.</p><p>Email receipts are available for withdrawals (including Fast Cash and withdrawals started in the Mobile Banking app), cash deposits, some check deposits and transfers. If you want a receipt with check images for your check deposits, you must choose a printed receipt. To protect your information, ATM email receipts do not contain your full account or card numbers.</p>"},{"label":"How do I validate the accuracy of my email address before choosing to receive an ATM email receipt?","content":"<p>To help protect your information, your email address will be partially hidden on the ATM screen. For example, john.doe@email.com will appear as j****e@email.com. On the <span class&#x3D;&#x27;cnx-bold&#x27;>Receipt Options</span> screen, you&#x27;re given the opportunity to <span class&#x3D;&#x27;cnx-bold&#x27;>Show</span> your full email address prior to selecting an email receipt. This will allow you to validate your email address.</p><p>If you have more than one email address associated with your bank accounts, you&#x27;re able to choose another email address during your ATM transaction by selecting <span class&#x3D;&#x27;cnx-bold&#x27;>Change</span> on the <span class&#x3D;&#x27;cnx-bold&#x27;>Receipt Options</span> screen. For each eligible transaction, only one email address can be selected to receive an email receipt.</p>"},{"label":"How do I add or remove email addresses presented at the ATM?","content":"<p>To update your contact information and manage the email addresses associated with your bank accounts, [LINK||signIntoOnlineBanking] or the Mobile Banking app and select <span class&#x3D;&#x27;cnx-bold&#x27;>Profile & Settings</span>. You may also [LINK||contactCustomerService4] or visit a [LINK||financialCenter5] for assistance with updating your contact information.</p><p>If your email address requires updating, you should not request an email receipt. Instead, select <span class&#x3D;&#x27;cnx-bold&#x27;>Print</span> or <span class&#x3D;&#x27;cnx-bold&#x27;>No Receipt.</span> Updates made to your email addresses in the Mobile Banking app, in Online Banking or by calling or visiting us will be reflected during future ATM transactions.</p>"},{"label":"Can I view my ATM receipts in Online or Mobile Banking?","content":"<p>ATM receipt images are not available in the Mobile Banking app or in Online Banking. However, you can see the details of your ATM transactions on the <span class&#x3D;&#x27;cnx-bold&#x27;>Account Activity</span> tab in either Online or Mobile Banking.</p>"}]},{"label":"Using contactless ATMs","content":[{"label":"Which Bank of America ATMs offer contactless transactions?","content":"<p>Contactless transactions can be completed at all Bank of America ATMs. [LINK||findAnAtm2]</p>"},{"label":"Can I use my contactless tap-to-pay card at a Bank of America ATM?","content":"<p>Yes, the contactless feature will work at all Bank of America ATMs. Non-Bank of America ATMs may or may not have the ability to facilitate a contactless transaction. [LINK||learnMoreContactlessCard]</p>"},{"label":"How do I use my card in my digital wallet at a Bank of America ATM?","content":"<p>All Bank of America ATMs have a contactless reader in addition to a standard card reader. Using the contactless reader, Bank of America debit cardholders can begin ATM transactions using a smartphone or other contactless device by following these steps:</p><ol><li>Select your Bank of America debit card in your digital wallet.</li><li>Hold your phone, or other contactless device, over the contactless symbol on the ATM.</li><li>When prompted, enter your debit card PIN using the ATM keypad.</li></ol>"},{"label":"If my phone is stolen, can someone use it to access my accounts at a Bank of America ATM?","content":"<p>If your device is lost or stolen and you cannot locate your device, you can lock or delete your digital cards by [LINK||signingIntoOnlineBanking], selecting <span class&#x3D;&#x27;cnx-bold&#x27;>Profile & Settings</span> then <span class&#x3D;&#x27;cnx-bold&#x27;>Digital Wallet & Virtual Card settings</span> and following the instructions provided.</p><p>We recommend that you lock your phone using a PIN or biometric security like fingerprint or facial recognition. Using this type of security setting for your device will help prevent unauthorized access to your phone&#x27;s contents, including access to an ATM.</p><p>Not an Online Banking customer? [LINK||enrollOnlineBanking]</p>"}]},{"label":"Troubleshooting ATM issues","content":[{"label":"How do I report an ATM that&#x27;s out of order or damaged?","content":"<p>Call 844-401-8500 and select option 1. Provide the ATM ID, which can be found on the ATM or on your ATM receipt.</p>"},{"label":"How do I submit a claim for an incorrect ATM deposit or withdrawal?","content":"<p>If your card was issued by Bank of America and you received the incorrect amount of cash or your deposit amount and/or receipt information is inaccurate, call 844-401-8500 and select option 2. Please provide as much information as possible about your transaction to assist us with researching and resolving your claim. Useful information may include a description of what occurred during your transaction at the ATM, the ATM ID or location of the ATM, and the date/time and amount of your transaction.</p><p>If your card was not issued by Bank of America and you received the incorrect amount of cash, contact the company who issued your card for assistance.</p>"},{"label":"What do I do if the deposit I made doesn&#x27;t match my receipt?","content":"<p>Report any discrepancies in your account by [LINK||contactingCustomerService] as soon as possible.</p>"},{"label":"What should I do if I don&#x27;t get a receipt for my deposit?","content":"<p>If you requested a receipt and did not receive one, [LINK||signInToOnlineBanking2] or view your account activity in the Mobile Banking app to verify your deposit is processing. If you are unable to verify the deposit is processing, [LINK||contactCustomerService5] for assistance with reviewing your account activity.</p>"},{"label":"What if the ATM doesn&#x27;t return my card or I leave my card in the ATM?","content":"<p>If your card was issued by Bank of America, the options for requesting a replacement card are:</p><ul><li>Visit a local [LINK||financialCenter6]</li><li>[LINK||replacementCardPhone]</li><li>[LINK||replacementCardOnline]</li><li>Report a lost card in the mobile app:<br /><br /><ol><li>Log in to the Mobile Banking app</li><li>Select <span class&#x3D;&#x27;cnx-bold&#x27;>Menu</span></li><li>Select <span class&#x3D;&#x27;cnx-bold&#x27;>Manage Debit/Credit Card</span></li><li>Select the card you wish to report lost</li><li>Verify your identity and a replacement card will be sent to you. While awaiting the arrival of your replacement card, your digital wallet typically remains active and can be used during this time. [LINK||learnMoreDigitalWallets2]</li></ol></li></ul><p>If your card was not issued by Bank of America and the ATM took your card, contact the company who issued your card for assistance.</p>"}]},{"label":"Using ATMs in foreign countries","content":[{"label":"How is cash dispensed from ATMs in foreign countries?","content":"<p>Cash in foreign countries is dispensed in the local currency and debited from your account in U.S. dollars.</p>"},{"label":"What is the Global ATM Alliance?","content":"<p>Bank of America participates in a Global ATM Alliance, which provides Bank of America clients access to International partner ATMs where the non-Bank of America ATM $5 usage fee for each withdrawal or transfer and ATM operator access fee can be avoided.<br />[LINK||learnMoreGlobalAtmAlliance]<br />[LINK||foreignExchangeRatesFaqs]</p>"},{"label":"What tips can you give me for using an ATM in foreign countries?","content":"<p>Here are five tips for using ATMs in foreign countries:</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>1. Check the network</h4><p>You can use your Bank of America debit card or ATM card anywhere you see the CIRRUS symbol. In addition to CIRRUS, you can use ATMs with the Mastercard or Visa symbols. The symbol on the front of your card will indicate if your card is Mastercard or Visa.<br />[LINK||findAMastercardOrCirrusAtm]<br />[LINK||findAVisaAtm]</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>2. Understand the types of fees being charged.</h4><p>The non-Bank of America ATM usage fee is $5. This fee is assessed for each withdrawal or transfer performed at a non-Bank of America ATM in a foreign country. In addition, the ATM operator may charge an access fee for cash withdrawals. Your deposit account statement will reflect the U.S. dollar equivalent of your foreign ATM withdrawal. Bank of America will assess an international transaction fee of 3% of the U.S. dollar amount for all ATM withdrawals processed in foreign currency. International ATM operators may offer to do your currency conversion for you, but they may charge a higher fee for conversion. To insure that your currency conversion does not incur a fee higher than the one stated above, you may refuse the ATM operator&#x27;s offer to convert the amount of the transaction. The fee is assessed as a separate transaction fee on the posting date of the withdrawal.</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>3. Verify your PIN before you travel.</h4><p>Most international ATM operators support up to 12-digit PINs. However, some ATM operators only support four-digit PINs. Be sure your PIN does not start with a zero. Be sure to know your PIN by numbers, as some ATMs outside the United States don&#x27;t have letters on the keypad. If necessary, change your PIN before traveling to a foreign country. [LINK||howToChangeYourPin]</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>4. Some international ATMs have limited functions.</h4><p>All international ATM operators will provide you with withdrawal access from your primary checking account, but some may not offer access to your savings account or the ability to conduct transfers and balance inquiries. Some international ATMs are only available during normal business hours. Some international ATMs may not offer instructions in English.</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>5. Have a backup plan.</h4><p>Systems used by international banks may occasionally be unavailable while you&#x27;re traveling, so there&#x27;s a possibility you won&#x27;t be able to use your card when you need to at an ATM or to make a purchase. In addition to using your debit or ATM card while traveling, consider also taking some foreign currency with you. [LINK||learnMoreAboutOrderingForeignCurrency]</p>"},{"label":"What happens if I&#x27;m unable to use my debit card or ATM card at an international ATM?","content":"<p>If you&#x27;re unable to use a foreign ATM, you may be able to use your debit card or ATM card to withdraw funds at a local bank.</p>"},{"label":"Should I get foreign currency before I travel?","content":"<p>Many travelers find it helpful to have local currency immediately upon arrival in a foreign country for tips, taxis and other miscellaneous expenditures. Some airports and train stations do not have foreign exchange offices; if they do, they may have limited hours of operation and may charge higher rates for currency exchange.</p><p>Bank of America clients with checking and savings accounts can order foreign currency using Online Banking or the Mobile Banking app. Customers with credit cards only can order currency at a financial center. [LINK||learnMoreAboutOrderingForeignCurrency2]</p>"},{"label":"I&#x27;m traveling to the U.S. from another country. Can I use a Bank of America ATM if I&#x27;m not a Bank of America customer?","content":"<p>International non-Bank of America Mastercard<sup>&reg;</sup> cardholders have the option to withdraw cash in U.S. dollars at Bank of America ATMs in the U.S. With this service, you have the convenience of seeing the cost of the transaction at our ATMs and on your ATM receipt. Bank of America will waive the ATM fee for those who accept Bank of America&#x27;s exchange rate offer and complete their withdrawal.</p>"}]},{"label":"ATM safety tips","content":[{"label":"Protect your ATM card and personal identification number (PIN)","content":"<ul><li>Always protect your card by keeping it in a safe place. If your card is lost or stolen, contact us immediately.</li><li>Memorize your PIN. Do not write it on your card, keep it in your wallet or give it to anyone.</li><li>If you choose your own PIN, avoid using numbers for your PIN that are easily identified (for example, birthdates, telephone numbers and addresses).</li><li>Never give your PIN to anyone or information about your card over the telephone, email or the internet, unless to a trusted merchant in a call or transaction you initiated. If someone asks for this information, refuse and immediately contact us.</li><li>Carefully review your account statements and report any fraudulent transactions immediately.</li></ul>"},{"label":"Be aware of your surroundings at ATMs","content":"<ul><li>Be aware of people and your surroundings before, during and after you use an ATM, particularly at night. If you think it is unsafe, press <span class&#x3D;&#x27;cnx-bold&#x27;>Cancel</span>, leave immediately and visit another ATM.</li><li>If you must use an ATM at night, take someone with you.</li><li>When using an ATM with a door that requires card access, close the entry door completely upon entering and exiting and do not open the door for anyone you don&#x27;t know.</li><li>When using a drive-up ATM, keep your engine running, doors locked and only the driver&#x27;s window open during the transaction.</li><li>The activity around Bank of America ATMs may be monitored or recorded by surveillance cameras.</li></ul>"},{"label":"Protect your privacy","content":"<ul><li>Shield the keypad with your hand or body while entering your PIN at an ATM.</li><li>Put your card, cash and receipt away immediately after completing your transaction. Do not display or count your cash at the ATM.</li></ul>"},{"label":"Request emergency assistance","content":"<p>If you need emergency assistance, call 911 from the nearest telephone. Report all crimes immediately to law enforcement and your local financial center.</p><p>In all states except NY and NJ, direct concerns about the security of Bank of America ATMs to our Corporate Security Department by calling 800-222-7511.</p><h4 class&#x3D;&#x27;headline-xsmall&#x27;>New York</h4><ul><li>Questions or complaints concerning security? Call our Security Department at 800-222-7511, or the New York Department of Financial Services at 888-697-2861.</li></ul><h4 class&#x3D;&#x27;headline-xsmall&#x27;>New Jersey</h4><ul><li>Questions or complaints concerning security? Call our Security Department at 800-222-7511, or the New Jersey Department of Banking at 609-292-7272.</li></ul>"}]}]},"faqsCta":{"heading":{"content":"Spend less time at the ATM"},"text":{"content":"Use your phone to speed up your trip by starting your ATM withdrawal right in our Mobile Banking app"},"link":{"url":"/online-banking/mobile-banking-faq.go","content":"Get the app"}},"LINKS":{"findAnAtm":{"URL":"https://locators.bankofamerica.com/","content":"Find a Bank of America ATM"},"findAnAtm2":{"URL":"https://locators.bankofamerica.com/","content":"Find a Bank of America ATM"},"personalScheduleFees":{"URL":"/{contextRoot}/account-fees/","content":"Personal Schedule of Fees"},"debitCardFaqs":{"URL":"/{contextRoot}/debit-card-faqs/","content":"View our FAQs about debit cards"},"learnAccessibleBanking":{"content":"Learn more about Accessible Banking","TARGET":"_blank"},"learnAccessibleBanking2":{"content":"Learn more about Accessible Banking","TARGET":"_blank"},"signInToOnlineBanking":{"URL":"{secureHost}/login/sign-in/signOnV2Screen.go","content":"Log in to Online Banking"},"signInToOnlineBanking2":{"URL":"{secureHost}/login/sign-in/signOnV2Screen.go","content":"log in to Online Banking"},"signingIntoOnlineBanking":{"URL":"{secureHost}/login/sign-in/signOnV2Screen.go","content":"signing into Online Banking"},"contactCustomerService":{"content":"Contact customer service","TARGET":"_blank"},"contactCustomerService2":{"content":"contact customer service","TARGET":"_blank"},"contactCustomerService3":{"content":"contact customer service","TA
