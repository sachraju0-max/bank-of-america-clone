  "name": "Bank Account Options for Students and Young Adults FAQs",
  "description": "Learn more about bank account options for students, teens, and young adults. Review fees and requirements for opening a bank account at Bank of America.",
  "keywords": "requirements to open a student bank account,bank of america student account requirements,how to open a bank account for students,wfid24580302",
  "url": "/www.bankofamerica.com/deposits/student-accounts-faqs/",
  "image": "/www.bankofamerica.com/content/images/ContextualSiteGraphics/Logos/en_US/logos/colored_flagscape-v2.png",
  "mainEntity": [
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Do you offer checking accounts for students?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>Bank of America Advantage SafeBalance Banking® provides a straightforward, easy-to-use experience that lets you focus on the basics. There are no overdraft fees and no monthly maintenance fee for accounts with an owner under 25. Please view your <a href='/www.bankofamerica.com/deposits/resources/personal-schedule-fees.go'>Personal Schedule of Fees</a> for details and other ways to avoid the monthly maintenance fee.</p>"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "Question",
      "name": "Can I open an account for my child who is going to college?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "<p>It's easy to open a checking account for your child who is going to college. Simply <a href='https://secure.bankofamerica.com/secure-mycommunications/public/appointments/?marketingCode=SRCHUNAUTH_ECSRCH'>schedule an appointment</a>, <a href='https://locators.bankofamerica.com/'>visit a financial center</a> or call to speak to a customer service representative. You can reach a Bank of America representative at 800.432.1000 (Mon-Fri 8 a.m.-11 p.m. or Sat-Sun 8 a.m.–8 p.m., all times ET). Outside the U.S. call 1.315.724.4022 (international collect; cell phone roaming charges may apply).</p><p>If your child has not yet left for college, please use your home address as the mailing address for the account. If your child has already left for college, consider applying for a joint account with a parent as the primary account holder. Then use your home address as the mailing address for the account; we'll be able to verify your address faster and will send all account-opening materials to your home address.</p>"
      }
    }
  ]
}</script></div><div id="interstitial" data-component="module" data-sparta-load="primary" data-module-ref="@sparta.sales.modules/es-en-interstitial-module" data-init="esEnInterstitial" data-module-parameters="{}" class="es-en-interstitial-module-class-v-1-0-2 es-en-interstitial-module spa-module-init" data-module="sales-es-en-interstitial-module" data-version="1.0.2" data-options="{}"></div></div></div></section><section class="small-centered"><div class="row small-collapse"><div class="column"><div id="faqsPageModule" data-component="module" data-sparta-load="primary" data-module-ref="@sparta.deposits-v6.modules/faqs-page-module" data-init="FAQsPageModule" data-module-parameters="{}" class="faqs-page-module-class-v-1-0-1 faqs-page-module spa-module-init" data-module="deposits-v6-faqs-page-module" data-version="1.0.1" data-options='{"headerFooterJCR":{"FOOTNOTES":{"mobileBankingApp":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.mobile-banking-app.html"},"bankAmeriDeals":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.BankAmeriDeals.html"},"keepTheChange":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.Keep-the-Change.html"}},"siteHeader":{"location":"header","menuLinks":{"defaults":{"heading":{"modifiers":"page-link-template-section-heading cnx-bold"},"body":{"list":true,"modifiers":"list-style-none list-spacing-bottom-12"}},"sections":[{"body":{"content":["[LINK||header-account-rates]","[LINK||header-account-fees]","[LINK||header-adv-banking-clarity-statement]","[LINK||header-managing-your-money]","[LINK||header-access-your-accounts]"]}},{"body":{"content":["[LINK||header-checking-accounts]","[LINK||header-savings-accounts]","[LINK||header-cd-accounts]","[LINK||header-iras]","[LINK||header-debit-cards]","[LINK||header-bank-accounts-overview]"]}}]}},"siteFooter":{"location":"footer","menuLinks":{"defaults":{"body":{"list":true,"modifiers":"list-style-none list-spacing-b xt":"Back to content","bofaRewardsFootnote":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||bofaRewards2NoTM]."},"fiveYearHoldingPeriod":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.five-year-holding-period-roth-ira.html"},"fudiciaryUnder25":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the Advantage Relationship Banking additional account benefit or the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"advantageRelationshipBanking":{"html":"The monthly maintenance fee waiver does not apply to clients in the BofA Rewards™ Member tier. The monthly maintenance fee is waived for clients in the Preferred Plus, Preferred Honors, and Premier tiers. For BofA Rewards program eligibility requirements, go to [LINK||footer_dp_bofaRewards]."},"annualPercentageYield":{"html":"Annual Percentage Yield (APY) is accurate as of {annualPercentageYieldTimeStamp.value::XXXX}. These rates may change at any time without prior notice. Fees could reduce earnings on the account."},"lifePlanForSwitchBank":{"contentReq":"disclosures.manifests.salesonb.deposits","contentKey":"footnotes.LifePlan.html"},"mobileErica":{"contentReq":"disclosures.manifests.salesonb.online-banking","contentKey":"footnotes.erica-language-support.html"},"earnRewards":{"html":"You must be enrolled in Online Banking or Mobile Banking to participate in the deals program and have either an eligible Bank of America<sup>®</sup> debit/credit card or Merrill credit card. Earned cash back will be credited into an eligible consumer deposit or credit account within 30 days following redemption. This deals program may not include deals available through other rewards programs. Data connection required. Wireless carrier fees may apply. For SafeBalance Banking<sup>®</sup> for Family Banking accounts, the parent owner can participate in the deals program but their child using the account cannot."},"ericaVirtualAssistance":{"html":"The mobile feature, Erica, is only available in the English language. This feature requires that you download the latest version of the Mobile Banking app and is only available for select mobile devices.  Message and data rates may apply. Your chat may be monitored for quality assurance. For SafeBalance Banking® for Family Banking accounts, the parent owner and their child age 13 or older have access to Erica."},"fingerPrintScannerEnrollment":{"html":"Certain devices are eligible for enrollment in Touch ID<sup>&reg;</sup>, Face ID<sup>&reg;</sup> or fingerprint login. If eligible, you will have the option to enroll by following the prompts within the Mobile Banking app. If you store multiple fingerprints on your device including those of additional persons, those persons will also be able to access your Bank of America Mobile Banking app via fingerprint, including the ability to access a call center, when Touch ID<sup>&reg;</sup> or fingerprint is enabled. Data connection required. Wireless carrier fees may apply."},"alertsReceivedTextMessages":{"html":"You may elect to receive alerts via text or email. Bank of America does not charge for this service, but your mobile carrier&#x27;s message and data rates may apply. Delivery of alerts may be affected or delayed by your mobile carrier’s coverage."},"debitCardControls":{"html":"We may allow you to lock your physical debit card or virtual cards. You must lock each card type individually. Locking your physical card will not lock your virtual cards.  Similarly, locking a virtual card will not lock your physical card or any other distinct virtual card. Each virtual card must be locked individually. We may provide you the ability to apply or remove a lock at your discretion via Online and/or Mobile banking.  Locking your physical debit card will not lock or prevent transactions from being authorized using your digital card for debit or for any virtual cards stored in digital wallets. Locking your card is not a replacement for reporting your card lost or stolen. This feature is available on the Mobile App for iPad, iPhone and Android devices and Online Banking for your physical debit card and on the Mobile Banking app only for your digital card. Data connection required for Mobile app and wireless carrier fees may apply."},"liabilityGuarentee":{"html":"Notify us within a reasonable time of the unauthorized use or the loss or theft of your card, card number or PIN. Certain restrictions apply. Consult your account documents for details. "},"fiduciaryAccounts":{"html":"Fiduciary accounts, including trust and estate accounts, do not qualify for the under the age of 25 requirement to waive the monthly maintenance fee. Additionally, accounts do not qualify for the under the age of 25 requirement to waive the monthly fee based on the age of the Payable on Death beneficiary. When you add an owner under the age of 25 to an existing Advantage SafeBalance Banking<sup>&reg;</sup> account, it may take 3 business days before your account meets the requirement to have the monthly maintenance fee waived. Please refer to the [LINK||ftnlink_personalScheduleOfFees] for more information."},"featuredCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC2K2FDVRI1.timeStamp::XXXX} and applies to the initial term of a new Featured CD. We may limit the amount you deposit in one or more Featured CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"flexibleCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1ST639A1B2.timeStamp::XXXX} and applies to the initial term of a new Flexible CD. Flexible CDs have a 12 month term. We may change the interest rate and APY at any time before account opening without prior notice. The minimum balance required to open a Flexible CD is {epcTokens.value.FSDPTDZZC1ST639A1B2.cdProductAttributes.minimumOpeningBalance::$XXXX}. We may limit the amount you deposit in one or more Flexible CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Deposits are insured by the FDIC up to $250,000 per depositor. Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. See [LINK||depositAgreement] and [LINK||depositsRateSheet] for more detail."},"standardCdApy":{"html":"Annual Percentage Yield (APY) is accurate as of {epcTokens.value.FSDPTDZZC1078F31GD1.timeStamp::XXXX} and applies to the initial term of a new Fixed Term CD. We may limit the amount you deposit in one or more Fixed CDs to a total of $1,000,000 ($250,000 for CDs opened through bankofamerica.com). Alternative terms are not allowed. Fees could reduce earnings on the account. Additional restrictions may apply. Ask your local financial center associate for details, terms and current rates."},"digitalDebitControl":{"html":"Customers enrolled in Mobile Banking may opt to receive the digital card for debit, a virtual card that that can be accessed anytime in Mobile Banking. The digital card for debit is designed for you to always have access to your digital card credentials to make online purc
